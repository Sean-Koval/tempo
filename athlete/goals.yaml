# Non-race goals. Parallel to race-calendar.yaml; both can drive bootstrap-plan.
#
# Each goal entry has a `type:` that controls how the composer anchors a chain:
#
#   - performance_target: metric + target + by_date → metric-specific block
#                         (ftp_target_16wk, css_target_12wk, strength_peak_12wk).
#                         Chain ends in deload_test (freshen + measurement).
#
#   - maintenance:        hold current fitness; metric optional. With by_date
#                         routes to base_building_8wk; open-ended routes to
#                         rolling_base_block_12wk.
#
#   - streak / adventure: declared, but not yet anchored by the composer
#                         (future tickets — see story 07 §9).
#
# Untyped non-race entries default to `performance_target` if metric+target
# are present, else `maintenance`. An explicit `type:` always wins.

goals:
  - id: 2026-bike-build-12wk
    type: performance_target
    metric: ftp_w
    current: 250
    target: 280              # +12% in 12 weeks; aggressive but achievable with structured build + BSI-forced cycling focus
    by_date: 2026-07-24      # 12 weeks from 2026-05-01
    constraints:
      weekly_hours_max: 12
      sport_focus: bike       # run paused (BSI); swim re-enters ~2026-06-06
      strength_touches_min: 4 # per athlete/strength-program.md
      bsi_protocol: |
        Left tibia BSI g2 active. NO RUN until medical clearance (~2026-06-06).
        From 2026-06-06: walk-jog return-to-run protocol if cleared.
        From mid-June: swim can re-enter with technique focus.
        Standing climbs OK on bike if pain-free; avoid sustained OOS on rough terrain.
    notes: |
      Bike-led 12-week build through BSI recovery. Phase shape: Base (4 wk: aerobic
      capacity + Z2 long-ride scaling 90 min → 3 hr) → Build1 (4 wk: sweet-spot +
      threshold) → Build2 (3 wk: VO2 + threshold consolidation) → Test/Deload (1 wk:
      fresh + FTP test).

      Aligns with the 2027 half IM A-race build — this *is* the bike base for it.
      Strength program (athlete/strength-program.md) continues throughout, gated by
      BSI rehab progression on the left calf.

      Re-evaluate at week 6 (mid-block) for FTP trajectory + BSI status. If BSI
      cleared by 2026-06-06 and walk-jog tolerated, weeks 7-12 can fold in 2-3
      easy run touches/week without disturbing the FTP target.

