# Race calendar. A/B/C priority drives tapering and peak alignment.
# The A-race anchors bootstrap-plan's phase back-calculation.
#
# Priority semantics:
#   A — peak for it; full taper, plan revolves around it.
#   B — race through it; micro-taper (R-19), no full taper.
#   C — train through; no taper, race-as-workout.
#
# Status semantics (default: confirmed when omitted):
#   confirmed — registered, plan can anchor on it.
#   tentative — likely-but-not-yet-registered; selectable but the agent
#               should surface uncertainty when picking it.
#   cancelled — withdrew or event was cancelled. Skipped by composer +
#               amend.switch_target. Requires `cancelled_reason`.
#
# Every race added here should have a corresponding plan-id eventually.

races:
  - id: 2027-half-ironman
    name: "Half Ironman (TBD venue)"
    date: 2027-05-01            # PLACEHOLDER — confirm exact date + race; replace before final taper math
    distance: half_ironman
    priority: A
    status: confirmed
    location: "TBD"
    expected_conditions:
      terrain: "TBD"
      water_temp_c: null
      air_temp_c: [null, null]
    goals:
      finish_time: "TBD"
      bike_power_target_w: null   # ~70-75% FTP for 70.3
      run_pace_target: "TBD"
    notes: |
      Anchor A-race for the 2026-2027 build. Currently injured (left tibial BSI g2,
      see injury-log.md) — bike-led base through ~2026-06-06, then phased re-entry of
      swim and run. Sean to confirm exact event + date; plan can compress/extend on
      restructure.

